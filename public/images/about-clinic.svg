<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F9FF"/>
      <stop offset="1" stop-color="#cfe1ec"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#ag)"/>
  <!-- Wall -->
  <rect y="0" width="800" height="600" fill="#e5f1f6"/>
  <!-- Floor -->
  <rect y="600" width="800" height="400" fill="#cfd9dd"/>
  <!-- Reception desk -->
  <rect x="120" y="540" width="560" height="220" rx="14" fill="#ffffff" stroke="#1a6b8a" stroke-width="3"/>
  <rect x="120" y="700" width="560" height="60" rx="6" fill="#1a6b8a"/>
  <!-- Sign on wall -->
  <rect x="240" y="120" width="320" height="120" rx="12" fill="#ffffff" stroke="#1a6b8a" stroke-width="3"/>
  <text x="400" y="170" text-anchor="middle" fill="#0D2233" font-family="Georgia, serif" font-weight="bold" font-size="32">Manchu</text>
  <text x="400" y="210" text-anchor="middle" fill="#1a6b8a" font-family="Georgia, serif" font-style="italic" font-size="22">Child Care</text>
  <!-- Heart on sign -->
  <g transform="translate(260,150)" fill="#FF8C42">
    <path d="M0 8 C 0 4, 4 0, 8 0 C 11 0, 14 2, 15 5 C 16 2, 19 0, 22 0 C 26 0, 30 4, 30 8 C 30 14, 15 24, 15 24 C 15 24, 0 14, 0 8 Z"/>
  </g>
  <!-- Plants -->
  <g transform="translate(80,580)" fill="#1a6b8a" opacity="0.7">
    <ellipse cx="20" cy="160" rx="35" ry="10" fill="#5a3a2a"/>
    <path d="M 20 50 Q 0 90 12 160 L 28 160 Q 40 90 20 50 Z" fill="#2e8b57"/>
    <path d="M 20 60 Q 50 80 35 130 L 28 130 Q 30 80 20 60 Z" fill="#3da06d"/>
  </g>
  <!-- Chairs in waiting area -->
  <g fill="#1a6b8a">
    <rect x="380" y="620" width="80" height="50" rx="8"/>
    <rect x="380" y="650" width="80" height="120" rx="6" opacity="0.7"/>
  </g>
  <!-- Window -->
  <rect x="600" y="80" width="160" height="200" rx="6" fill="#cfe9f3" stroke="#1a6b8a" stroke-width="3"/>
  <line x1="680" y1="80" x2="680" y2="280" stroke="#1a6b8a" stroke-width="2"/>
  <line x1="600" y1="180" x2="760" y2="180" stroke="#1a6b8a" stroke-width="2"/>
  <text x="400" y="920" text-anchor="middle" fill="#1a6b8a" opacity="0.45" font-family="Georgia, serif" font-style="italic" font-size="20">Reception · Sompeta</text>
</svg>
